    function salvarContato() {
      const vcf = [

        "VERSION:3.0",
        "FN:Igor Carneiro",
        "N:Carneiro;Igor;;;",
        "ORG:Petrolinked",
        "TITLE:Diretor Financeiro",

        "TEL;TYPE=WORK,VOICE:+557131429999",

        "URL:https://plkd.com.br",
        "ADR;TYPE=WORK:;;Rua Irecê\, 143 - Galpão 1;Lauro de Freitas;BA;;Brasil",
        "END:VCARD"
      ].join("\n");

      const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "Igor_Carneiro.vcf";
      a.click();
      URL.revokeObjectURL(url);
    }
